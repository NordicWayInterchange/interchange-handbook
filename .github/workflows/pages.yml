name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public
          mkdir -p public/generated

          # Copy everything from repository root
          cp -r *.html public/ || true
          cp -r *.css public/ || true
          cp -r *.js public/ || true

          # Copy generated assets
          cp -r generated/* public/generated/

          echo "=== DEPLOY CONTENT ==="
          find public -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4