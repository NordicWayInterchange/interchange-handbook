name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public
          mkdir -p public/generated

          # Copy root website files
          cp -r *.html public/ 2>/dev/null || true
          cp -r *.css public/ 2>/dev/null || true
          cp -r *.js public/ 2>/dev/null || true

          # Copy generated files
          cp -r generated/. public/generated/

          echo "=== Before path fixes ==="
          grep -R '/generated/' public || true

      - name: Fix paths for GitHub Pages
        run: |
          # HTML image/link paths
          find public -name "*.html" -exec sed -i \
          's|/generated/|/interchange-handbook/generated/|g' {} \;

          # JavaScript download paths
          find public -name "*.js" -exec sed -i \
          's|/generated/|/interchange-handbook/generated/|g' {} \;

          echo "=== After path fixes ==="
          grep -R '/generated/' public || true
          grep -R '/interchange-handbook/generated/' public || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4