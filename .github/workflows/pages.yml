name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public
          mkdir -p public
          mkdir -p public/generated

          # Copy website files from repository root
          cp -r *.html public/ 2>/dev/null || true
          cp -r *.css public/ 2>/dev/null || true
          cp -r *.js public/ 2>/dev/null || true

          # Copy generated folder to keep /generated/... paths
          cp -r generated/. public/generated/

          # Also copy generated files to root if they reference root assets
          cp -r generated/. public/

          echo "=== Files deployed ==="
          find public -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4