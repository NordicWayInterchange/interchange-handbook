name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public
          mkdir -p public/generated

          # Copy generated site files to the website root
          cp -r generated/* public/

          # Also keep a generated folder for absolute paths like /generated/file.png
          cp -r generated/* public/generated/

          echo "Files to deploy:"
          find public -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4