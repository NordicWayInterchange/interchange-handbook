name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public

          mkdir -p public/generated
          mkdir -p public/interchange-handbook/generated

          # Copy root HTML/CSS/JS
          cp -r *.html public/ 2>/dev/null || true
          cp -r *.css public/ 2>/dev/null || true
          cp -r *.js public/ 2>/dev/null || true

          # Copy root PNG images
          cp -r *.png public/ 2>/dev/null || true

          # Copy generated folder
          cp -r generated/. public/generated/

          # Duplicate generated folder for GitHub Pages project path
          cp -r generated/. public/interchange-handbook/generated/

          echo "=== Files before fixes ==="
          find public -type f | sort

      - name: Fix GitHub Pages paths
        run: |
          # Fix generated images/files in HTML
          find public -name "*.html" -exec sed -i \
          's|src="/generated/|src="/interchange-handbook/generated/|g' {} \;

          # Fix generated links in HTML
          find public -name "*.html" -exec sed -i \
          's|href="/generated/|href="/interchange-handbook/generated/|g' {} \;

          # Fix generated paths in JavaScript
          find public -name "*.js" -exec sed -i \
          's|/generated/|/interchange-handbook/generated/|g' {} \;

          # Disable home links
          find public -name "*.html" -exec sed -i \
          's|href="/"|href="#" onclick="return false;"|g' {} \;

          # Fix root PNG images
          find public -name "*.html" -exec sed -i \
          's|src="/\([^/][^"]*\.png\)"|src="/interchange-handbook/\1"|g' {} \;

          # Fix CSS root PNG images
          find public -name "*.css" -exec sed -i \
          's|url("/\([^/][^"]*\.png\)")|url("/interchange-handbook/\1")|g' {} \;

          echo "=== References after fixes ==="
          grep -R "interchange-handbook" public || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4