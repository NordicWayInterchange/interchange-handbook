name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        run: |
          rm -rf public
          mkdir -p public/generated

          # Copy root website files
          cp -r *.html public/ 2>/dev/null || true
          cp -r *.css public/ 2>/dev/null || true
          cp -r *.js public/ 2>/dev/null || true

          # Copy root PNG images
          cp -r *.png public/ 2>/dev/null || true

          # Copy generated folder
          cp -r generated/. public/generated/

          echo "=== Files before fixes ==="
          find public -type f | sort

      - name: Fix GitHub Pages paths
        run: |
          # Fix /generated/... paths in HTML
          find public -name "*.html" -exec sed -i \
          's|/generated/|/interchange-handbook/generated/|g' {} \;

          # Fix /generated/... paths in JavaScript
          find public -name "*.js" -exec sed -i \
          's|/generated/|/interchange-handbook/generated/|g' {} \;

          # Disable links pointing to /
          find public -name "*.html" -exec sed -i \
          's|href="/"|href="#" onclick="return false;"|g' {} \;

          # Fix root PNG image paths: src="/image.png"
          find public -name "*.html" -exec sed -i \
          -e 's|src="/\([^/][^"]*\.png\)"|src="/interchange-handbook/\1"|g' {} \;

          # Fix CSS png paths: url("/image.png")
          find public -name "*.css" -exec sed -i \
          -e 's|url("/\([^/][^"]*\.png\)")|url("/interchange-handbook/\1")|g' {} \;

          echo "=== Files after fixes ==="
          grep -R "interchange-handbook" public || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4